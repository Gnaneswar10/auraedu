<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AuraEdu</title>
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-main);
      position: relative;
      overflow: hidden;
    }
    .auth-bg-glow {
      position: absolute;
      top: -20%;
      left: -10%;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(37,99,235,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-bg-glow-2 {
      position: absolute;
      bottom: -20%;
      right: -10%;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
      pointer-events: none;
    }
    .auth-card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
    }
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-head);
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 12px;
      text-decoration: none;
      color: var(--text-main);
    }
    .auth-logo-icon {
      width: 42px;
      height: 42px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-cyan) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 0 20px rgba(37,99,235,0.3);
    }
    .auth-logo span {
      color: var(--accent-cyan);
    }
    .auth-title {
      font-family: var(--font-head);
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .auth-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }
    .alert.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: var(--red);
    }
    .alert.success {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3);
      color: var(--green);
    }
    .alert.show {
      display: block;
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .auth-footer a {
      color: var(--accent-cyan);
      text-decoration: none;
      font-weight: 600;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    .loading {
      opacity: 0.6;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-bg-glow"></div>
    <div class="auth-bg-glow-2"></div>

    <div class="auth-card">
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <div class="auth-logo-icon">🎓</div>
          Aura<span>Edu</span>
        </a>
        <h1 class="auth-title" id="auth-mode-title">Welcome Back</h1>
        <p class="auth-subtitle" id="auth-mode-subtitle">Sign in to access your dashboard</p>
      </div>

      <div class="alert" id="alert-message"></div>

      <form id="auth-form">
        <div class="form-group" id="name-field" style="display:none">
          <label>Full Name</label>
          <input type="text" id="full-name" placeholder="John Doe" />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="admin@school.edu" required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>

        <div class="form-group" id="role-field" style="display:none">
          <label>Role</label>
          <select id="role">
            <option value="admin">Admin</option>
            <option value="teacher">Teacher</option>
            <option value="parent">Parent</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn" style="width:100%;justify-content:center;margin-top:24px">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        <p style="color:var(--text-muted);font-size:0.9rem">
          <span id="toggle-text">Don't have an account?</span>
          <a href="#" id="toggle-mode">Sign Up</a>
        </p>
        <p style="margin-top:12px">
          <a href="index.html" style="color:var(--text-muted)">← Back to Home</a>
        </p>
      </div>
    </div>
  </div>

  <script type="module" src="/src/auth.js"></script>
</body>
</html>
